<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter</title>
<link rel="icon" type="Logo.png" href="Logo.png">
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: {
                            bg: '#080B12',
                            card: '#111622',
                            cardHover: '#1A2133',
                            accent: '#22d3ee', /* Cyan-400 */
                            accentHover: '#06b6d4', /* Cyan-500 */
                            accentMuted: 'rgba(34, 211, 238, 0.1)',
                            border: '#1F2937'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Image Conversion Engines -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        .hidden-custom { display: none !important; }
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        .animate-spin { animation: spin 1s linear infinite; }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #1F2937; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #374151; }
    </style>
</head>
<body class="min-h-screen bg-theme-bg text-slate-200 font-sans p-4 md:p-8 selection:bg-theme-accent selection:text-theme-bg">

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 bg-red-950/80 border border-red-900 text-red-200 px-4 py-3 rounded-xl shadow-lg backdrop-blur-sm items-center gap-2 max-w-sm transition-all">
        <i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i>
        <span id="toastMsg" class="text-sm font-medium"></span>
        <button id="toastClose" class="ml-auto text-red-400 hover:text-red-300">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
    </div>

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="text-center mb-10 mt-4">
            <div class="inline-flex items-center justify-center p-3.5 bg-theme-accent text-theme-bg rounded-2xl mb-5 shadow-[0_0_20px_rgba(34,211,238,0.3)]">
                <i data-lucide="image" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-white mb-4">Universal Image Converter</h1>
            <p class="text-slate-400 max-w-xl mx-auto text-sm md:text-base leading-relaxed">
                Batch convert any image format instantly in your browser. 100% free, and unlimited. Made by JSB
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Left Column: Settings & Dropzone -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- Settings Card -->
                <div class="bg-theme-card rounded-2xl p-6 shadow-xl shadow-black/20 border border-theme-border flex flex-col gap-6">
                    <div class="flex items-center gap-2 text-white font-semibold border-b border-theme-border pb-4">
                        <i data-lucide="settings" class="w-5 h-5 text-theme-accent"></i>
                        <h2>Conversion Settings</h2>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="space-y-3">
                            <label class="text-sm font-medium text-slate-300">Output Format</label>
                            <select id="image-format" class="w-full bg-[#0A0D14] border border-theme-border text-white text-sm rounded-lg focus:ring-theme-accent focus:border-theme-accent block p-2.5 outline-none transition-colors">
                                <option value="image/jpeg" selected>JPG (Standard)</option>
                                <option value="image/png">PNG (Transparent)</option>
                                <option value="image/webp">WEBP (Web Optimized)</option>
                                <option value="image/bmp">BMP (Bitmap)</option>
                                <option value="image/gif">GIF (Static)</option>
                                <option value="image/tiff">TIFF (High Quality)</option>
                                <option value="image/x-icon">ICO (Icon)</option>
                            </select>
                        </div>
                        <div id="image-quality-container" class="space-y-3 transition-opacity">
                            <div class="flex justify-between items-center">
                                <label class="text-sm font-medium text-slate-300">Quality</label>
                                <span id="quality-value" class="text-xs font-bold text-theme-accent bg-theme-accentMuted px-2.5 py-1 rounded-full">80%</span>
                            </div>
                            <input id="quality-input" type="range" min="0.1" max="1" step="0.1" value="0.8" class="w-full accent-theme-accent h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer outline-none" />
                        </div>
                    </div>
                </div>

                <!-- Dropzone -->
                <div id="dropzone" class="bg-theme-card rounded-2xl p-8 shadow-xl shadow-black/20 border-2 border-dashed border-theme-border hover:border-theme-accent hover:bg-theme-cardHover transition-all duration-300 cursor-pointer group text-center flex flex-col items-center justify-center min-h-[220px]">
                    <!-- Accepts virtually all standard image types plus HEIC/HEIF -->
                    <input type="file" id="fileInput" class="hidden" multiple accept="image/*,.heic,.heif" />
                    <div class="bg-theme-accentMuted text-theme-accent p-4 rounded-2xl mb-5 group-hover:scale-110 transition-transform duration-300">
                        <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                    </div>
                    <h3 class="font-semibold text-white mb-2 text-lg">Drag & Drop Images</h3>
                    <p class="text-sm text-slate-400">or click to browse your files</p>
                </div>
                
                <!-- Main Action Button -->
                <div id="convert-btn-wrapper" class="hidden-custom">
                    <button id="convert-btn" class="w-full bg-theme-accent hover:bg-theme-accentHover disabled:bg-slate-800 disabled:text-slate-500 disabled:cursor-not-allowed text-theme-bg font-bold py-4 px-4 rounded-xl shadow-[0_0_15px_rgba(34,211,238,0.2)] hover:shadow-[0_0_25px_rgba(34,211,238,0.4)] transition-all duration-300 flex items-center justify-center gap-2">
                        <!-- Content injected by JS -->
                    </button>
                </div>
            </div>

            <!-- Right Column: File List -->
            <div class="lg:col-span-2">
                <div class="bg-theme-card rounded-2xl shadow-xl shadow-black/20 border border-theme-border flex flex-col h-full min-h-[400px]">
                    
                    <!-- List Header -->
                    <div class="px-6 py-5 border-b border-theme-border flex justify-between items-center bg-[#131926] rounded-t-2xl">
                        <div>
                            <h2 class="font-semibold text-white">Conversion Queue</h2>
                            <p id="total-files" class="text-xs text-slate-400 mt-1">0 total files</p>
                        </div>
                        
                        <div id="list-actions" class="flex gap-3 hidden-custom">
                            <button id="zip-btn" class="text-sm px-4 py-2 bg-theme-accentMuted text-theme-accent hover:bg-[rgba(34,211,238,0.2)] font-medium rounded-lg transition-colors flex items-center gap-2" style="display: none;">
                                <i data-lucide="file-archive" class="w-4 h-4"></i>
                                Save ZIP
                            </button>
                            <button id="clear-btn" class="text-sm px-4 py-2 text-slate-400 hover:bg-slate-800 hover:text-white font-medium rounded-lg transition-colors flex items-center gap-2">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                Clear All
                            </button>
                        </div>
                    </div>

                    <!-- List Body -->
                    <div class="flex-1 p-3 overflow-y-auto max-h-[600px] custom-scrollbar">
                        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 p-8 space-y-4 min-h-[300px]">
                            <div class="flex items-center gap-2 opacity-20">
                                <i data-lucide="image" class="w-16 h-16"></i>
                            </div>
                            <p class="text-center text-sm leading-relaxed">No images uploaded yet.<br/>Drag and drop images to start converting.</p>
                        </div>
                        
                        <ul id="file-list" class="space-y-2 p-1">
                            <!-- Items injected by JS -->
                        </ul>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Application State
        const state = {
            files: [],
            imageOutputFormat: 'image/jpeg',
            imageQuality: 0.8,
            isConverting: false
        };

        // --- Helpers ---
        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function getStatusIconHTML(status) {
            if (status === 'pending') return '<i data-lucide="clock" class="w-[18px] h-[18px] text-slate-500"></i>';
            if (status === 'converting') return '<i data-lucide="loader-2" class="w-[18px] h-[18px] text-theme-accent animate-spin"></i>';
            if (status === 'done') return '<i data-lucide="check-circle-2" class="w-[18px] h-[18px] text-theme-accent"></i>';
            if (status === 'error') return '<i data-lucide="alert-circle" class="w-[18px] h-[18px] text-red-400"></i>';
            return '';
        }

        function getMediaType(file) {
            if (file.type.startsWith('image/') || file.name.match(/\.(heic|heif)$/i)) return 'image';
            return 'unknown';
        }

        function getNewExtension() {
            const map = {
                'image/jpeg': '.jpg',
                'image/png': '.png',
                'image/webp': '.webp',
                'image/bmp': '.bmp',
                'image/gif': '.gif',
                'image/tiff': '.tiff',
                'image/x-icon': '.ico'
            };
            return map[state.imageOutputFormat] || '.png';
        }

        // --- Error Toast ---
        function showError(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('hidden');
            toast.classList.add('flex');
            setTimeout(hideError, 4500);
        }

        function hideError() {
            const toast = document.getElementById('toast');
            toast.classList.add('hidden');
            toast.classList.remove('flex');
        }
        document.getElementById('toastClose').addEventListener('click', hideError);

        // --- Core UI Updaters ---
        function renderUI() {
            const pendingCount = state.files.filter(f => f.status === 'pending' || f.status === 'error').length;
            const doneCount = state.files.filter(f => f.status === 'done').length;
            
            document.getElementById('total-files').textContent = `${state.files.length} total files`;
            
            const convertBtn = document.getElementById('convert-btn');
            const convertBtnWrapper = document.getElementById('convert-btn-wrapper');
            
            if (state.files.length > 0) {
                convertBtnWrapper.classList.remove('hidden-custom');
                convertBtn.disabled = state.isConverting || pendingCount === 0;
                
                if (state.isConverting) {
                    convertBtn.innerHTML = `<i data-lucide="loader-2" class="w-[18px] h-[18px] animate-spin"></i> Converting...`;
                } else {
                    convertBtn.innerHTML = `<i data-lucide="zap" class="w-[18px] h-[18px]"></i> Convert ${pendingCount > 0 ? pendingCount : ''} Images`;
                }
            } else {
                convertBtnWrapper.classList.add('hidden-custom');
            }

            const zipBtn = document.getElementById('zip-btn');
            const clearBtn = document.getElementById('clear-btn');
            const actionsContainer = document.getElementById('list-actions');
            
            if (state.files.length > 0) {
                actionsContainer.classList.remove('hidden-custom');
                zipBtn.style.display = doneCount > 0 ? 'flex' : 'none';
                clearBtn.disabled = state.isConverting;
            } else {
                actionsContainer.classList.add('hidden-custom');
            }
            lucide.createIcons();
        }

        function renderList() {
            const listContainer = document.getElementById('file-list');
            const emptyState = document.getElementById('empty-state');
            
            if (state.files.length === 0) {
                emptyState.classList.remove('hidden-custom');
                listContainer.innerHTML = '';
            } else {
                emptyState.classList.add('hidden-custom');
                listContainer.innerHTML = state.files.map(file => `
                    <li id="file-item-${file.id}" class="group flex items-center gap-4 p-3 hover:bg-theme-cardHover rounded-xl transition-colors border border-transparent hover:border-theme-border">
                        <div class="status-icon shrink-0 flex items-center justify-center w-11 h-11 rounded-lg bg-[#0A0D14] border border-theme-border/50">
                            <!-- Populated by updateFileUI -->
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-slate-200 truncate" title="${file.name}">${file.name}</p>
                            <div class="details-container flex flex-col mt-1">
                                <!-- Populated by updateFileUI -->
                            </div>
                        </div>
                        <div class="actions-container flex items-center gap-1 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity focus-within:opacity-100">
                            <!-- Populated by updateFileUI -->
                        </div>
                    </li>
                `).join('');
                
                state.files.forEach(file => updateFileUI(file));
            }
        }

        function updateFileUI(file) {
            const li = document.getElementById(`file-item-${file.id}`);
            if (!li) return;
            
            li.querySelector('.status-icon').innerHTML = getStatusIconHTML(file.status);

            const extBadge = file.status === 'done' && file.convertedExtension 
                ? file.convertedExtension.replace('.', '') 
                : getNewExtension().replace('.', '');

            li.querySelector('.details-container').innerHTML = `
                <div class="flex items-center gap-2 text-xs text-slate-500">
                    <span>${formatSize(file.size)}</span>
                    ${file.status === 'done' ? `
                        <span class="text-slate-600">→</span>
                        <span class="text-theme-accent font-medium">${formatSize(file.convertedSize)}</span>
                        <span class="ml-auto text-theme-accent bg-theme-accentMuted px-2 py-[2px] rounded text-[10px] uppercase font-bold tracking-wide">${extBadge}</span>
                    ` : ''}
                    ${file.status === 'error' ? `<span class="text-red-400 font-medium truncate max-w-[150px]" title="${file.errorMessage || 'Failed'}">${file.errorMessage || 'Failed'}</span>` : ''}
                </div>
            `;

            li.querySelector('.actions-container').innerHTML = `
                ${file.status === 'done' ? `
                    <button onclick="window.downloadFile('${file.id}')" class="p-2 text-theme-accent hover:bg-theme-accentMuted rounded-lg transition-colors focus:opacity-100" title="Download">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </button>
                ` : ''}
                <button onclick="window.removeFile('${file.id}')" ${state.isConverting && file.status === 'converting' ? 'disabled' : ''} class="p-2 text-slate-500 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-colors disabled:opacity-50 focus:opacity-100" title="Remove">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            `;
            lucide.createIcons({ root: li });
        }

        // --- File Handling & Listeners ---
        function processSelectedFiles(selectedFiles) {
            const newFiles = Array.from(selectedFiles)
                .map(f => {
                    const type = getMediaType(f);
                    if (type !== 'image') return null; // Reject anything that isn't an image
                    
                    return {
                        id: Math.random().toString(36).substring(2, 9),
                        originalFile: f,
                        name: f.name,
                        size: f.size,
                        status: 'pending',
                        convertedBlobUrl: null,
                        convertedSize: null,
                        convertedExtension: null,
                        errorMessage: null
                    };
                })
                .filter(f => f !== null);
                
            if (newFiles.length === 0 && selectedFiles.length > 0) {
                showError('Please select valid image files.');
                return;
            }
            
            state.files.push(...newFiles);
            renderList();
            renderUI();
        }

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.addEventListener('dragover', e => {
            e.preventDefault();
            dropzone.classList.add('border-theme-accent', 'bg-theme-cardHover');
        });
        dropzone.addEventListener('dragleave', e => {
            e.preventDefault();
            dropzone.classList.remove('border-theme-accent', 'bg-theme-cardHover');
        });
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('border-theme-accent', 'bg-theme-cardHover');
            processSelectedFiles(e.dataTransfer.files);
        });
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => {
            processSelectedFiles(e.target.files);
            e.target.value = '';
        });

        // Settings Listeners
        document.getElementById('image-format').addEventListener('change', e => {
            state.imageOutputFormat = e.target.value;
            const qualityDiv = document.getElementById('image-quality-container');
            // Quality slider is primarily effective for JPEG and WEBP
            if (state.imageOutputFormat === 'image/jpeg' || state.imageOutputFormat === 'image/webp') {
                qualityDiv.classList.remove('hidden-custom');
            } else {
                qualityDiv.classList.add('hidden-custom');
            }
            
            // Update extension badges on pending items visually
            state.files.forEach(f => { if(f.status === 'pending') updateFileUI(f); });
        });

        const qualityInput = document.getElementById('quality-input');
        const qualityValue = document.getElementById('quality-value');
        qualityInput.addEventListener('input', e => {
            state.imageQuality = parseFloat(e.target.value);
            qualityValue.textContent = Math.round(state.imageQuality * 100) + '%';
        });

        // --- Conversion Engine ---
        async function convertImage(fileObj) {
            const format = state.imageOutputFormat;
            const quality = state.imageQuality;
            
            let blob = fileObj.originalFile;

            // 1. Process HEIC/HEIF files first
            if (blob.name.match(/\.(heic|heif)$/i)) {
                if (typeof heic2any === 'undefined') throw new Error("HEIC engine not loaded");
                
                // If requested format is natively supported by heic2any, run directly
                if (['image/jpeg', 'image/png', 'image/gif'].includes(format)) {
                    let result = await heic2any({ blob: blob, toType: format, quality: format === 'image/jpeg' ? quality : undefined });
                    return Array.isArray(result) ? result[0] : result;
                } else {
                    // Otherwise, convert HEIC to a standard PNG first, then pass down to HTML canvas
                    let result = await heic2any({ blob: blob, toType: 'image/png' });
                    blob = Array.isArray(result) ? result[0] : result;
                }
            }

            // 2. Process all image types using native Canvas 
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(blob);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.toBlob(outBlob => {
                        // Some older browsers default to PNG if the format isn't supported. That's a safe fallback.
                        if (outBlob) resolve(outBlob);
                        else reject(new Error("Image extraction failed for this format."));
                    }, format, quality);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error("Failed to read image data format"));
                };
                img.src = url;
            });
        }

        // --- Main Controller ---
        async function convertFiles() {
            state.isConverting = true;
            renderUI();

            for (let i = 0; i < state.files.length; i++) {
                const file = state.files[i];
                if (file.status === 'done') continue;
                
                file.status = 'converting';
                file.errorMessage = null;
                updateFileUI(file);

                try {
                    let blob = await convertImage(file);

                    file.status = 'done';
                    file.convertedBlobUrl = URL.createObjectURL(blob);
                    file.convertedSize = blob.size;
                    file.convertedExtension = getNewExtension();
                } catch(error) {
                    console.error("Conversion error:", error);
                    file.status = 'error';
                    file.errorMessage = error.message || "Conversion failed";
                }
                
                updateFileUI(file);
                // Tiny breathing room to prevent browser thread locking up
                await new Promise(r => setTimeout(r, 50)); 
            }
            
            state.isConverting = false;
            renderUI();
        }

        // Global Actions
        window.downloadFile = function(id) {
            const file = state.files.find(f => f.id === id);
            if (!file || !file.convertedBlobUrl) return;
            
            const a = document.createElement('a');
            a.href = file.convertedBlobUrl;
            // Trim old extension and apply new extension
            const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            a.download = baseName + file.convertedExtension;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
        
        window.removeFile = function(id) {
            if (state.isConverting) return; // Prevent deleting while processing queue
            
            const index = state.files.findIndex(f => f.id === id);
            if (index > -1) {
                if (state.files[index].convertedBlobUrl) {
                    URL.revokeObjectURL(state.files[index].convertedBlobUrl);
                }
                state.files.splice(index, 1);
                renderList();
                renderUI();
            }
        };

        document.getElementById('convert-btn').addEventListener('click', convertFiles);
        
        document.getElementById('clear-btn').addEventListener('click', () => {
            if (state.isConverting) return;
            state.files.forEach(f => {
                if (f.convertedBlobUrl) URL.revokeObjectURL(f.convertedBlobUrl);
            });
            state.files = [];
            renderList();
            renderUI();
        });

        document.getElementById('zip-btn').addEventListener('click', async () => {
            if (typeof JSZip === 'undefined') {
                showError('ZIP engine is not loaded.');
                return;
            }
            
            const zip = new JSZip();
            const doneFiles = state.files.filter(f => f.status === 'done');
            if (doneFiles.length === 0) return;
            
            const names = new Set();
            doneFiles.forEach(file => {
                let baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                let ext = file.convertedExtension;
                let fileName = baseName + ext;
                let counter = 1;
                // Prevent duplicate naming if identically named files are uploaded
                while(names.has(fileName)) {
                    fileName = `${baseName}_${counter}${ext}`;
                    counter++;
                }
                names.add(fileName);
                zip.file(fileName, fetch(file.convertedBlobUrl).then(res => res.blob()));
            });
            
            try {
                const content = await zip.generateAsync({ type: 'blob' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = 'Converted_Images.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch(err) {
                showError('Failed to create ZIP file.');
            }
        });

    </script>
</body>
</html>
